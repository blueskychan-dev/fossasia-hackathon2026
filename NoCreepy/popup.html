<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>NoCreepy</title>
  <link rel="stylesheet" href="./assets/main.css">
</head>

<body>
  <div class="app">
    <div class="top">
      <p>NoCreepy</p>
    </div>
    <div class="toggle">

    </div>
    <div class="statistics">
      <hr>
      <p class="subtitle" style="margin-top:8px;margin-bottom:8px">Settings and statistics</p>
      <div class="info">
        <img src="assets/icons/filter.svg" alt="Filter">

          <span class="paragraph">Filter preset: Profanity</span>
          <span class="subtitle">320,727 words are filtered</a>
